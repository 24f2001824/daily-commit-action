name: Daily Auto Commit

on:
  schedule:
    - cron: '15 10 * * *'   # runs daily at 10:15 UTC
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: 24f2001824@ds.study.iitm.ac.in daily update
        run: |
          echo "Updated on $(date)" >> update.log

      - name: Commit changes
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "24f2001824@ds.study.iitm.ac.in"
          git add .
          git commit -m "Daily automated commit" || echo "No changes"
          git push
