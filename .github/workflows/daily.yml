name: Daily Auto Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '15 10 * * *'
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: 24f2001824@ds.study.iitm.ac.in daily update
        run: |
          echo "Updated on $(date)" >> update.log

      - name: Commit and Push
        run: |
          git config user.name "automation-bot"
          git config user.email "24f2001824@ds.study.iitm.ac.in"
          git add .
          git commit -m "Daily automated commit" || echo "No changes"
          git push
